.card-grid{display:grid;grid-template-columns:78px 1fr;gap:12px;}

.hier-cell.active.bek{background:var(--c-bek);color:#ffffff;box-shadow:0 0 0 2px var(--c-bek-dark);}
.hier-cell.active.haus{background:var(--c-haus);color:#ffffff;box-shadow:0 0 0 2px var(--c-haus-dark);}
.tag-label{font-size:0.62em;color:var(--c-faint);font-weight:600;letter-spacing:1.5px;margin-bottom:10px;text-transform:uppercase;}

.answer-divider{display:flex;align-items:center;gap:8px;color:var(--c-faint);font-size:0.7em;margin:6px 0 12px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;}

.main-box{border-left:5px solid;padding:14px 18px;border-radius:4px;margin-bottom:10px;color:var(--c-text);}
.main-box.bv{border-color:var(--c-bv);background:var(--c-bv-bg);}
.main-box.gesetz{border-color:var(--c-gesetz);background:var(--c-gesetz-bg);}
.main-box.vo{border-color:var(--c-vo);background:var(--c-vo-bg);}
.main-box.bek{border-color:var(--c-bek);background:var(--c-bek-bg);}
.main-box.haus{border-color:var(--c-haus);background:var(--c-haus-bg);}
.norm-header{font-weight:700;font-size:1.1em;margin-bottom:10px;}
.norm-header.bv{color:var(--c-bv-dark);}
.norm-header.gesetz{color:var(--c-gesetz-dark);}
.norm-header.vo{color:var(--c-vo-dark);}
.norm-header.bek{color:var(--c-bek-dark);}
.norm-header.haus{color:var(--c-haus-dark);}

.subbox .sub-h.bv{color:var(--c-bv-dark);}
.subbox .sub-h.gesetz{color:var(--c-gesetz-dark);}
.subbox .sub-h.vo{color:var(--c-vo-dark);}
.subbox .sub-h.bek{color:var(--c-bek-dark);}

.body-text li{color:var(--c-text);margin-bottom:2px;}

.hl-green{background:var(--c-good-bg);color:var(--c-good);padding:2px 6px;border-radius:3px;font-weight:700;}

.falle-box{background:var(--c-falle-bg);border-left:4px solid var(--c-falle);padding:10px 14px;border-radius:4px;font-size:0.92em;color:var(--c-text);margin-top:8px;}

.hinweis-box{background:var(--c-good-bg);border-left:4px solid var(--c-good);padding:10px 14px;border-radius:4px;font-size:0.92em;color:var(--c-text);margin-top:8px;}
.tip-box{background:var(--c-highlight);border-left:3px solid var(--c-vo);padding:8px 12px;border-radius:3px;color:var(--c-text);margin-top:8px;font-size:0.93em;}

table.data-tbl th{padding:6px 10px;text-align:left;color:#ffffff;}
table.data-tbl th.center{text-align:center;}
table.data-tbl.bv th{background:var(--c-bv-dark);}
table.data-tbl.gesetz th{background:var(--c-gesetz-dark);}
table.data-tbl.vo th{background:var(--c-vo-dark);}
table.data-tbl.bek th{background:var(--c-bek-dark);}
table.data-tbl tr:nth-child(even){background:#f8fafc;}
table.data-tbl td{padding:6px 10px;color:var(--c-text);}
table.data-tbl td.center{text-align:center;font-weight:700;color:var(--c-good);}
.quelle-box{font-size:0.78em;color:var(--c-faint);padding:6px 10px;border-top:1px solid var(--c-border);margin-top:6px;}

.card-nav{display:flex;justify-content:space-between;align-items:center;margin-top:16px;gap:8px;}

.card-nav button.flip-btn{background:var(--c-bv);}
.card-nav button:disabled{opacity:0.4;cursor:default;}
.card-nav button:hover:not(:disabled){opacity:0.85;}
.progress-row{display:flex;gap:8px;margin-top:12px;}
.progress-row button{flex:1;padding:8px;background:#ffffff;border:1px solid var(--c-border);color:var(--c-text);border-radius:6px;cursor:pointer;font-size:0.85em;}
.progress-row button.missed{border-color:var(--c-falle);color:var(--c-falle-dark);}
.progress-row button.hard{border-color:var(--c-vo);color:var(--c-vo-dark);}
.progress-row button.good{border-color:var(--c-good);color:var(--c-good);}
.progress-row button:hover{background:#f8fafc;}
.empty-state{text-align:center;padding:40px;color:var(--c-faint);}

  .hier-cell{font-size:0.62em;padding:6px 2px;}
  .lerndeck-wrap h1{font-size:1.15em;}
}
</style>

let pool = [...CARDS];
let idx = 0;
let flipped = false;
let progress = JSON.parse(localStorage.getItem("mp03_progress") || "{}");

const $ = (s) => document.querySelector(s);
const $$ = (s) => document.querySelectorAll(s);

function renderHier(card){
  return HIER.map(h => {
    const isVo = h.key === "VO";
    const lbl = isVo ? card.vo : h.label;
    const isActive = card.ebene === h.key;
    const cls = isActive ? `hier-cell active ${norm2cls[h.key]}` : "hier-cell";
    return `<div class="${cls}">${lbl}</div>`;
  }).join("");
}

function renderBody(items){
  return items.map(it => {
    if (it.t === "text") return `<div class="body-text">${it.c}</div>`;
    if (it.t === "list") return `<div class="body-text"><ul>${it.c.map(x=>`<li>${x}</li>`).join("")}</ul></div>`;
    if (it.t === "olist") return `<div class="body-text"><ol>${it.c.map(x=>`<li>${x}</li>`).join("")}</ol></div>`;
    if (it.t === "subbox") return `<div class="subbox"><div class="sub-h ${it.cls||""}">${it.h}</div><div>${it.c}</div></div>`;
    if (it.t === "subbox-line") return `<div class="subbox" style="border-left:3px solid var(--c-${it.cls});padding-left:10px;">${it.c}</div>`;
    if (it.t === "falle") return `<div class="falle-box"><b class="warn">${it.h||"⚠ FALLE:"}</b> ${it.c}</div>`;
    if (it.t === "hinweis") return `<div class="hinweis-box"><b style="color:var(--c-good)">${it.h||"Hinweis:"}</b> ${it.c}</div>`;
    if (it.t === "tip") return `<div class="tip-box">${it.c}</div>`;
    if (it.t === "table") {
      const head = `<tr>${it.headers.map((h,i)=>`<th${i===it.centerCol?" class='center'":""}>${h}</th>`).join("")}</tr>`;
      const rows = it.rows.map(r => `<tr>${r.map((c,i)=>`<td${i===it.centerCol?" class='center'":""}>${c}</td>`).join("")}</tr>`).join("");
      return `<table class="data-tbl ${it.cls||""}">${head}${rows}</table>`;
    }
    return "";
  }).join("");
}

function renderCard(card){
  const cls = norm2cls[card.ebene];
  const blockLabel = card.falle ? `⚠ FALLE · ${card.block.toUpperCase()}` : card.block.toUpperCase();
  const tagCls = card.falle ? "tag-label falle" : "tag-label";
  const subInfo = card.sub ? `<div style="font-style:italic;color:var(--c-${cls}-dark);font-size:0.88em;margin-bottom:10px;">${card.sub}</div>` : "";
  if (!flipped) {
    // Front: Frage groß und prominent
    return `<div class="card-grid"><div class="hier-col">${renderHier(card)}</div><div><div class="${tagCls}">${blockLabel}</div><div class="front-q">${card.front}</div></div></div>`;
  } else {
    // Back: Frage als Kontext oben (dezenter), Antwort prominent darunter
    const questionContext = `<div class="${tagCls}">${blockLabel}</div><div class="front-q-context">${card.front}</div><div class="answer-divider">Antwort</div>`;
    const answerBlock = `<div class="main-box ${cls}"><div class="norm-header ${cls}">${card.header}</div>${subInfo}${renderBody(card.body)}</div><div class="quelle-box"><b>Quelle:</b> ${card.quelle}</div>`;
    return `<div class="card-grid"><div class="hier-col">${renderHier(card)}</div><div>${questionContext}${answerBlock}</div></div>`;
  }
}

function applyFilters(){
  const norm = $("#filter-norm").value;
  const block = $("#filter-block").value;
  const onlyFalle = $("#only-falle").checked;
  const onlyHoch = $("#only-hochprior").checked;
  const search = $("#search").value.toLowerCase().trim();
  pool = CARDS.filter(c => {
    if (norm && c.norm !== norm) return false;
    if (block && c.block !== block) return false;
    if (onlyFalle && !c.falle) return false;
    if (onlyHoch && !c.hochprior) return false;
    if (search) {
      const hay = (c.front + " " + c.header + " " + JSON.stringify(c.body)).toLowerCase();
      if (!hay.includes(search)) return false;
    }
    return true;
  });
  idx = 0; flipped = false;
  render();
}

function render(){
  const total = pool.length;
  $("#total").textContent = total;
  if (total === 0) {
    $("#card-content").innerHTML = `<div class="empty-state">Keine Karten passen zu diesen Filtern.</div>`;
    $("#cur-idx").textContent = 0;
    $("#flip-hint").style.display = "none";
    return;
  }
  $("#flip-hint").style.display = flipped ? "none" : "block";
  $("#cur-idx").textContent = idx + 1;
  const card = pool[idx];
  $("#card-frame").className = "card-frame" + (card.falle ? " is-falle" : "");
  $("#card-content").innerHTML = renderCard(card);
  $("#prev").disabled = (idx === 0);
  $("#next").disabled = (idx === total - 1);
  $("#flip").textContent = flipped ? "Zurück zur Frage" : "Antwort zeigen";
  $("#rating-row").style.display = flipped ? "flex" : "none";
}

function shuffle(){
  for (let i = pool.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [pool[i], pool[j]] = [pool[j], pool[i]];
  }
  idx = 0; flipped = false; render();
}

$("#flip").onclick = $("#card-frame").onclick = () => { flipped = !flipped; render(); };
$("#prev").onclick = (e) => { e.stopPropagation(); if (idx > 0) { idx--; flipped = false; render(); } };
$("#next").onclick = (e) => { e.stopPropagation(); if (idx < pool.length - 1) { idx++; flipped = false; render(); } };
$("#shuffle").onclick = shuffle;
$("#reset").onclick = () => { pool = [...CARDS]; idx = 0; flipped = false; ["#search","#filter-norm","#filter-block"].forEach(s=>$(s).value=""); ["#only-falle","#only-hochprior"].forEach(s=>$(s).checked=false); render(); };
["#filter-norm","#filter-block"].forEach(s=>$(s).addEventListener("change", applyFilters));
["#only-falle","#only-hochprior"].forEach(s=>$(s).addEventListener("change", applyFilters));
$("#search").addEventListener("input", () => { clearTimeout(window._searchTimeout); window._searchTimeout = setTimeout(applyFilters, 200); });
$$(".progress-row button").forEach(btn => {
  btn.addEventListener("click", (e) => {
    e.stopPropagation();
    const rating = btn.dataset.rating;
    const card = pool[idx];
    progress[card.id] = { rating: rating, ts: Date.now() };
    localStorage.setItem("mp03_progress", JSON.stringify(progress));
    if (idx < pool.length - 1) { idx++; flipped = false; render(); }
  });
});
document.addEventListener("keydown", (e) => {
  if (e.target.tagName === "INPUT") return;
  if (e.key === " " || e.key === "Enter") { e.preventDefault(); flipped = !flipped; render(); }
  if (e.key === "ArrowLeft" && idx > 0) { idx--; flipped = false; render(); }
  if (e.key === "ArrowRight" && idx < pool.length - 1) { idx++; flipped = false; render(); }
});
render();
</script>
</body>
</html>
